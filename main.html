<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #74143e;
    color: white;
    margin: 0;
}

input, button {
    font-size: 18px;
    padding: 12px;
    width: 90%;
    max-width: 400px;
    margin: 10px auto;
    display: block;
    border-radius: 10px;
    border: none;
}

#resultados button {
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Registro de Asistencia</h1>
<h2 id="contador">Asistentes: 0</h2>

<input type="text" id="buscador" placeholder="Escribe nombre...">

<div id="resultados"></div>

<h2 id="mensaje"></h2>

<script>
let EVENTO_ID = null;

document.getElementById("buscador").addEventListener("keyup", buscar);

async function buscar() {
    let texto = document.getElementById("buscador").value;

    if (texto.length < 2) {
        document.getElementById("resultados").innerHTML = "";
        return;
    }

    let res = await fetch(`/buscar?nombre=${texto}`);
    let data = await res.json();

    let contenedor = document.getElementById("resultados");
    contenedor.innerHTML = "";

    data.forEach(j => {
        let btn = document.createElement("button");
        btn.textContent = j.nombre;

        btn.onclick = () => registrar(j.id, j.nombre);

        contenedor.appendChild(btn);
    });
}

async function registrar(id, nombre) {
    if (!EVENTO_ID) return;

    let res = await fetch(`/asistencia_manual?joven_id=${id}&evento_id=${EVENTO_ID}`, {
        method: "POST"
    });

    let data = await res.json();

    document.getElementById("mensaje").innerText =
        "✔ " + nombre + " registrado correctamente";

    document.getElementById("buscador").value = "";
    document.getElementById("resultados").innerHTML = "";
}

async function obtenerEvento() {
    let res = await fetch("/evento/activo");
    let data = await res.json();

    EVENTO_ID = data.evento_id;

    setInterval(actualizarContador, 2000);
}

async function actualizarContador() {
    if (!EVENTO_ID) return;

    let res = await fetch(`/evento/${EVENTO_ID}/conteo`);
    let data = await res.json();

    document.getElementById("contador").innerText =
        "Asistentes: " + data.asistentes;
}

obtenerEvento();
</script>

</body>
</html>
