<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #74143e;
            color: white;
            margin: 0;
        }

        h1 { font-size: 22px; }

        input {
            font-size: 20px;
            padding: 12px;
            width: 90%;
            max-width: 400px;
            margin: 15px auto;
            display: block;
            border-radius: 10px;
            border: none;
        }

        button {
            font-size: 18px;
            margin: 6px auto;
            padding: 12px;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            border: none;
        }

        #mensaje {
            font-size: 20px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h1>Registro de Asistencia</h1>
<h2 id="contador">Asistentes: 0</h2>

<input type="text" id="buscador" placeholder="Escribe nombre..." onkeyup="buscar()">

<div id="resultados"></div>

<h2 id="mensaje"></h2>

<script>
console.log("JS cargado 🔥");


let EVENTO_ID = null;

async function buscar() {
    let texto = document.getElementById("buscador").value;

    if (texto.length < 2) {
        document.getElementById("resultados").innerHTML = "";
        return;
    }

    let res = await fetch(`/buscar?nombre=${texto}`);
    let data = await res.json();

    let html = "";

    data.forEach(j => {
       html += `<button data-id="${j.id}">${j.nombre}</button>`;
    });

    document.getElementById("resultados").innerHTML = html;
    document.querySelectorAll("#resultados button").forEach(btn => {
    btn.addEventListener("click", () => {
        let id = btn.getAttribute("data-id");
        console.log("CLICK FUNCIONA:", id);
        registrar(id);
    });
});
}

async function registrar(id) {
    if (!EVENTO_ID) return;

    let res = await fetch(`/asistencia_manual?joven_id=${id}&evento_id=${EVENTO_ID}`, {
        method: "POST"
    });

    let data = await res.json();

    document.getElementById("mensaje").innerText =
        "✔ Registro completado";

    document.getElementById("buscador").value = "";
    document.getElementById("resultados").innerHTML = "";
}


async function obtenerEvento() {
    let res = await fetch("/evento/activo");
    let data = await res.json();

    EVENTO_ID = data.evento_id;

    setInterval(actualizarContador, 2000);
}

async function actualizarContador() {
    if (!EVENTO_ID) return;

    let res = await fetch(`/evento/${EVENTO_ID}/conteo`);
    let data = await res.json();

    document.getElementById("contador").innerText =
        "Asistentes: " + data.asistentes;
}
function probarClick(id) {
    console.log("CLICK FUNCIONA:", id);
}

obtenerEvento();
</script>

</body>
</html>
